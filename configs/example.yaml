# Example configuration for Fancy LLM Router
# Copy this to configs/local.yaml and customize for your environment

# Application settings
app:
  name: fancy_llm_router
  environment: development
  debug: true
  log_level: INFO
  host: 0.0.0.0
  port: 8000
  # Shared key clients must send as Authorization: Bearer <key> or X-API-Key.
  # Set ROUTER_API_KEY in .env for public deployments.
  # api_auth_token: ${ROUTER_API_KEY}

# Model deployments
#
# Each entry is a DEPLOYMENT: one logical `model` served by one `source`.
# The mapping key is the unique deployment id (convention: `<model>@<source>`),
# which lets the SAME logical model be served by multiple sources at once.
#
#   model       logical name a caller asks for (e.g. Qwen/Qwen3-32B). Many
#               deployments may share one logical model.
#   source      who hosts it (nebius, ollama, hyperbolic, mistral, ...).
#   provider    the API protocol the source speaks (openai, anthropic, ...).
#   model_id    the WIRE id sent to that host's API (may differ per source,
#               e.g. `Qwen/Qwen3-32B` on Nebius vs `qwen3:32b` on Ollama).
#
# Callers request a logical `model` (or `auto`) and the router picks the best
# deployment by the active strategy (cost / latency / quality).
models:
  # --- Same logical model (Qwen/Qwen3-32B) from two sources -----------------
  qwen3-32b@nebius:
    model: Qwen/Qwen3-32B
    source: nebius
    provider: openai           # Nebius speaks the OpenAI protocol
    model_id: Qwen/Qwen3-32B
    name: Qwen3-32B (Nebius)
    api_base_url: https://api.tokenfactory.nebius.com/v1/
    api_key: ${NEBIUS_API_KEY}
    default_temperature: 0.7
    default_max_tokens: 4096
    input_token_price: 1.0e-07
    output_token_price: 3.0e-07
    context_window: 41000
    tokens_per_second: 23.0
    quantization: FP8
    enabled: true

  qwen3-32b@ollama:
    model: Qwen/Qwen3-32B       # same logical model...
    source: ollama              # ...different source (free, local)
    provider: openai            # Ollama exposes an OpenAI-compatible API
    model_id: qwen3:32b         # but a different wire id
    name: Qwen3-32B (local)
    api_base_url: http://localhost:11434/v1/
    default_temperature: 0.7
    default_max_tokens: 4096
    input_token_price: 0.0
    output_token_price: 0.0
    context_window: 41000
    tokens_per_second: 15.0
    quantization: Q4_K_M
    enabled: false

  # --- Same logical model (Mistral) from cloud vs local ---------------------
  mistral-small@mistral:
    model: mistral-small-latest
    source: mistral
    provider: openai            # Mistral cloud, OpenAI-compatible endpoint
    model_id: mistral-small-latest
    name: Mistral Small (cloud)
    api_base_url: https://api.mistral.ai/v1/
    api_key: ${MISTRAL_API_KEY}
    input_token_price: 2.0e-07
    output_token_price: 6.0e-07
    context_window: 32000
    enabled: false

  mistral-small@local:
    model: mistral-small-latest
    source: local
    provider: openai
    model_id: mistral:latest
    name: Mistral Small (local)
    api_base_url: http://localhost:11434/v1/
    input_token_price: 0.0
    output_token_price: 0.0
    context_window: 32000
    enabled: false

  # --- Anthropic (its own protocol) -----------------------------------------
  claude-3-sonnet@anthropic:
    model: claude-3-sonnet
    source: anthropic
    provider: anthropic
    model_id: claude-3-sonnet-20240229
    name: Claude 3 Sonnet
    api_key: ${ANTHROPIC_API_KEY}
    input_token_price: 0.000003
    output_token_price: 0.000015
    context_window: 200000
    enabled: false

  # --- Mock deployment (offline, no API key) for testing / token burning ----
  mock-fast@mock:
    model: mock-fast
    source: mock
    provider: mock
    model_id: mock-fast
    name: Mock Fast
    context_window: 8192
    input_token_price: 0.0
    output_token_price: 0.0
    tokens_per_second: 1000
    enabled: false

# Tool configurations
tools:
  # Mock tools for testing
  calculator:
    module: fancy_llm_router.tools.mock
    tool_id: calculator
    name: Calculator
    description: A simple calculator tool
    enabled: true

  web_search:
    module: fancy_llm_router.tools.web
    tool_id: web_search
    name: Web Search
    description: Search the web for information
    api_endpoint: https://api.example.com/search
    timeout_seconds: 10
    enabled: false

# Metrics configuration
metrics:
  enabled: true
  track_token_usage: true
  track_cost: true
  track_latency: true
  track_quality: true
  track_model_drift: true
  
  # Quality evaluation
  evaluate_relevance: true
  evaluate_accuracy: true
  evaluate_coherence: true
  
  # Drift detection
  drift_detection_window_days: 30
  drift_threshold: 0.1  # 10% change triggers alert
  
  # Benchmarking
  benchmark_interval_hours: 24
  benchmark_models:
    - gpt-4
    - claude-3

# Storage configuration
storage:
  backend: sqlite
  sqlite_path: data/metrics.db
  retention_days: 365  # Keep metrics for 1 year

# Router configuration
router:
  default_strategy: balanced
  use_fallback: true
  fallback_models:
    - gpt-3.5-turbo
    - gpt-4
  
  # Default routing criteria
  default_criteria:
    min_relevance_score: 0.7
    min_accuracy_score: 0.7
    min_coherence_score: 0.7
    max_cost_usd: 1.0
    max_latency_ms: 10000
    
    # Strategy weights (for BALANCED strategy)
    cost_weight: 0.4
    latency_weight: 0.3
    quality_weight: 0.3
  
  # Caching
  cache_responses: true
  cache_ttl_seconds: 3600

# Session configuration
sessions:
  max_concurrent: 10
  default_timeout_seconds: 300
  continue_on_failure: false
